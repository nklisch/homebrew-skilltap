name: Update Formula

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          # Strip leading 'v' for the formula
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "num=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        run: |
          curl -fsSL \
            "https://github.com/nklisch/skilltap/releases/download/${{ steps.version.outputs.tag }}/checksums.txt" \
            -o checksums.txt

      - name: Update formula
        run: |
          chmod +x scripts/update-formula.sh
          ./scripts/update-formula.sh "${{ steps.version.outputs.num }}" checksums.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/skilltap.rb
          git diff --cached --quiet || git commit -m "Update skilltap to ${{ steps.version.outputs.tag }}"
          git push origin main
